<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEXtra – Dicționar comunitar</title>

  <!-- Firebase SDK (compat, no bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a56a0;
      --blue2:  #1245801a;
      --red:    #c0392b;
      --gray:   #5a5a5a;
      --border: #d4d4d4;
      --bg:     #f5f5f5;
      --card:   #ffffff;
      --radius: 6px;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: #222;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: var(--blue);
      padding: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px 10px;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: -1px;
      text-decoration: none;
      line-height: 1;
    }
    .logo span { color: #ffd54f; }
    .tagline {
      font-size: 0.78rem;
      color: #b3cde8;
      font-family: Arial, sans-serif;
      font-style: italic;
    }

    .search-bar {
      background: #fff;
      padding: 10px 24px 12px;
      display: flex;
      gap: 8px;
    }
    .search-bar input {
      flex: 1;
      max-width: 520px;
      border: 2px solid var(--blue);
      border-radius: var(--radius);
      padding: 9px 14px;
      font-size: 1.05rem;
      font-family: Arial, sans-serif;
      outline: none;
    }
    .search-bar input:focus { border-color: #0d3d6e; }
    .btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 20px;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #0d3d6e; }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--blue);
      color: var(--blue);
    }
    .btn-outline:hover { background: var(--blue2); }
    .btn-green { background: #27ae60; }
    .btn-green:hover { background: #1e8449; }
    .btn-red { background: var(--red); }
    .btn-red:hover { background: #992d22; }

    /* ── Layout ───────────────────────────────────────────── */
    .container {
      max-width: 820px;
      margin: 28px auto;
      padding: 0 16px;
    }

    /* ── Cards ────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    /* ── Entry ────────────────────────────────────────────── */
    .entry-word {
      font-size: 1.55rem;
      font-weight: bold;
      color: var(--blue);
      letter-spacing: 0.5px;
    }
    .entry-meta {
      font-size: 0.82rem;
      color: var(--gray);
      font-family: Arial, sans-serif;
      margin: 4px 0 10px;
    }
    .entry-meta .pos {
      font-style: italic;
      color: #888;
      margin-right: 8px;
    }
    .entry-definition {
      font-size: 1.02rem;
      line-height: 1.7;
      color: #1a1a1a;
    }
    .entry-example {
      font-style: italic;
      color: var(--gray);
      margin-top: 8px;
      font-size: 0.95rem;
      border-left: 3px solid var(--border);
      padding-left: 12px;
    }
    .entry-source {
      margin-top: 12px;
      font-size: 0.78rem;
      color: #999;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .source-badge {
      background: var(--blue2);
      border: 1px solid #c5d9f0;
      color: var(--blue);
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: bold;
      font-size: 0.74rem;
    }
    .community-badge {
      background: #eafaf1;
      border: 1px solid #a9dfbf;
      color: #1e8449;
    }

    .vote-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .vote-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: Arial, sans-serif;
      color: var(--gray);
      transition: all 0.1s;
    }
    .vote-btn:hover { border-color: var(--blue); color: var(--blue); }
    .vote-count { font-size: 0.82rem; color: var(--gray); }

    /* ── Section headings ─────────────────────────────────── */
    .section-title {
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
      font-weight: bold;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
    }

    /* ── Add definition button ────────────────────────────── */
    .add-trigger-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    /* ── Modal ────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 28px 32px;
      width: min(540px, 95vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .modal h2 {
      font-size: 1.25rem;
      margin-bottom: 18px;
      color: var(--blue);
      font-family: Arial, sans-serif;
    }
    .modal .close-btn {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--gray);
      line-height: 1;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
      font-weight: bold;
      margin-bottom: 5px;
      color: #444;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-size: 0.97rem;
      font-family: Georgia, serif;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--blue); background: #fff; }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-group select { font-family: Arial, sans-serif; }

    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }

    /* ── Empty / loading states ───────────────────────────── */
    .state-msg {
      text-align: center;
      color: var(--gray);
      font-family: Arial, sans-serif;
      padding: 32px 0;
      font-size: 0.95rem;
    }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Recent additions sidebar-style ───────────────────── */
    .recent-list { list-style: none; }
    .recent-list li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      font-family: Arial, sans-serif;
    }
    .recent-list li:last-child { border-bottom: none; }
    .recent-word {
      color: var(--blue);
      font-weight: bold;
      cursor: pointer;
    }
    .recent-word:hover { text-decoration: underline; }
    .recent-preview {
      color: var(--gray);
      font-size: 0.82rem;
    }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #222;
      color: #fff;
      padding: 12px 20px;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      color: #aaa;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .header-top { flex-direction: column; align-items: flex-start; gap: 4px; }
      .modal { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header>
  <div class="header-top">
    <a href="dextra.html" class="logo">DEX<span>tra</span></a>
    <span class="tagline">Dicționar colaborativ — definițiile voastre, pentru toți</span>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Caută un cuvânt…" autocomplete="off" />
    <button class="btn" onclick="doSearch()">Caută</button>
    <button class="btn btn-outline" onclick="openModal()">+ Adaugă definiție</button>
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────────── -->
<div class="container">

  <!-- Results -->
  <div id="results"></div>

  <!-- Recent additions -->
  <div class="card" id="recentCard">
    <div class="section-title">Adăugate recent de comunitate</div>
    <div id="recentList"><div class="state-msg"><span class="spinner"></span> Se încarcă…</div></div>
  </div>

</div>

<!-- ── ADD DEFINITION MODAL ────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="closeModalOnBackdrop(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="close-btn" onclick="closeModal()" title="Închide">×</button>
    <h2 id="modalTitle">Adaugă o definiție</h2>

    <div class="form-group">
      <label for="fWord">Cuvânt *</label>
      <input type="text" id="fWord" placeholder="ex. serendipitate" />
    </div>
    <div class="form-group">
      <label for="fPos">Parte de vorbire</label>
      <select id="fPos">
        <option value="">— selectează —</option>
        <option>substantiv</option>
        <option>verb</option>
        <option>adjectiv</option>
        <option>adverb</option>
        <option>interjecție</option>
        <option>expresie</option>
        <option>acronim</option>
        <option>argou</option>
        <option>altele</option>
      </select>
    </div>
    <div class="form-group">
      <label for="fDef">Definiție *</label>
      <textarea id="fDef" placeholder="Scrie definiția cât mai clar…"></textarea>
    </div>
    <div class="form-group">
      <label for="fExample">Exemplu de utilizare (opțional)</label>
      <input type="text" id="fExample" placeholder="ex. A fost o serendipitate să ne întâlnim acolo." />
    </div>
    <div class="form-group">
      <label for="fAuthor">Autor / pseudonim (opțional)</label>
      <input type="text" id="fAuthor" placeholder="anonim" />
    </div>
    <div class="form-actions">
      <button class="btn" style="background:#888;" onclick="closeModal()">Renunță</button>
      <button class="btn btn-green" onclick="submitDefinition()">Publică</button>
    </div>
  </div>
</div>

<!-- ── TOAST ────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── FOOTER ──────────────────────────────────────────────── -->
<footer>
  DEXtra &mdash; dicționar colaborativ &bull; definițiile aparțin autorilor lor &bull; <a href="index.html" style="color:#aaa;">înapoi la portfolio</a>
</footer>


<script>
  /* ══════════════════════════════════════════════════════════
     FIREBASE CONFIG
     ─────────────────────────────────────────────────────────
     1. Mergi la https://console.firebase.google.com
     2. Creează un proiect (ex. "dextra-dict")
     3. Adaugă o aplicație Web (</> icon)
     4. Copiază obiectul firebaseConfig și înlocuiește mai jos
     5. În Firebase Console → Firestore Database → Creare DB
        (selectează "Start in test mode" pentru început)
  ══════════════════════════════════════════════════════════ */
  const firebaseConfig = {
    apiKey:            "AIzaSyBLC_dCSTI3yfn3L2719FogqW1jq3QJRy8",
    authDomain:        "dexro-196bd.firebaseapp.com",
    projectId:         "dexro-196bd",
    storageBucket:     "dexro-196bd.firebasestorage.app",
    messagingSenderId: "503491041054",
    appId:             "1:503491041054:web:11355509098c4c73ecdb0f",
    measurementId:     "G-756SKQTFBH"
  };

  /* ── Init Firebase ──────────────────────────────────────── */
  let db;
  let firebaseReady = false;

  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  } catch(e) {
    console.warn("Firebase nu e configurat:", e.message);
  }

  /* ══════════════════════════════════════════════════════════
     SEARCH
  ══════════════════════════════════════════════════════════ */
  const searchInput = document.getElementById("searchInput");

  searchInput.addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });

  function normalizeWord(w) {
    return w.trim().toLowerCase()
      .replace(/ă/g,"a").replace(/â/g,"a").replace(/î/g,"i")
      .replace(/ș/g,"s").replace(/ț/g,"t")
      .replace(/[^a-z0-9 ]/g,"");
  }

  async function doSearch() {
    const raw = searchInput.value.trim();
    if (!raw) return;
    const target = raw.toLowerCase();
    const targetNorm = normalizeWord(raw);

    const box = document.getElementById("results");
    box.innerHTML = `<div class="state-msg"><span class="spinner"></span> Caut…</div>`;

    if (!firebaseReady) {
      box.innerHTML = renderConfigWarning();
      return;
    }

    try {
      // Query: cuvântul exact (case-insensitive via stored lowercase copy)
      const snap = await db.collection("definitions")
        .where("wordLower", "in", [target, targetNorm])
        .orderBy("votes", "desc")
        .get();

      // Also try normalized match if different
      let docs = snap.docs;
      if (targetNorm !== target) {
        const snap2 = await db.collection("definitions")
          .where("wordLower", "==", targetNorm)
          .orderBy("votes", "desc")
          .get();
        // Merge, deduplicate
        const ids = new Set(docs.map(d => d.id));
        snap2.docs.forEach(d => { if (!ids.has(d.id)) docs.push(d); });
      }

      if (docs.length === 0) {
        box.innerHTML = `
          <div class="card">
            <div class="state-msg">
              Niciun rezultat pentru <strong>${escHtml(raw)}</strong>.<br><br>
              <button class="btn" onclick="openModal('${escHtml(raw)}')">Fii primul care adaugă o definiție!</button>
            </div>
          </div>`;
        return;
      }

      box.innerHTML = `
        <div class="section-title" style="margin-bottom:12px;">
          ${docs.length} definiție${docs.length > 1 ? " (sortate după voturi)" : ""} pentru „${escHtml(raw)}"
        </div>
        <div class="add-trigger-row">
          <button class="btn btn-outline" onclick="openModal('${escHtml(raw)}')">+ Adaugă varianta ta</button>
        </div>
        ${docs.map(d => renderEntry(d.id, d.data())).join("")}`;

    } catch(err) {
      box.innerHTML = `<div class="state-msg">Eroare la căutare: ${escHtml(err.message)}</div>`;
    }
  }

  /* ══════════════════════════════════════════════════════════
     RENDER ENTRY
  ══════════════════════════════════════════════════════════ */
  function renderEntry(id, d) {
    const example = d.example
      ? `<div class="entry-example">${escHtml(d.example)}</div>`
      : "";
    const pos = d.pos ? `<span class="pos">${escHtml(d.pos)}</span>` : "";
    const author = d.author || "anonim";
    const ts = d.createdAt
      ? new Date(d.createdAt.seconds * 1000).toLocaleDateString("ro-RO")
      : "";

    return `
      <div class="card" id="entry-${id}">
        <div class="entry-word">${escHtml(d.word)}</div>
        <div class="entry-meta">${pos}adăugat de <strong>${escHtml(author)}</strong>${ts ? " · " + ts : ""}</div>
        <div class="entry-definition">${escHtml(d.definition)}</div>
        ${example}
        <div class="entry-source" style="margin-top:14px; justify-content:space-between; flex-wrap:wrap; gap:8px;">
          <div>
            <span class="source-badge community-badge">Comunitate</span>
          </div>
          <div class="vote-row">
            <button class="vote-btn" onclick="vote('${id}', 1)" title="Util">👍 Util</button>
            <span class="vote-count" id="votes-${id}">${d.votes || 0}</span>
            <button class="vote-btn" onclick="vote('${id}', -1)" title="Nu e util">👎</button>
          </div>
        </div>
      </div>`;
  }

  /* ══════════════════════════════════════════════════════════
     VOTE
  ══════════════════════════════════════════════════════════ */
  const voted = new Set(JSON.parse(localStorage.getItem("dextra_voted") || "[]"));

  async function vote(id, delta) {
    if (voted.has(id)) { showToast("Ai votat deja pentru această definiție."); return; }
    if (!firebaseReady) return;
    try {
      await db.collection("definitions").doc(id).update({
        votes: firebase.firestore.FieldValue.increment(delta)
      });
      voted.add(id);
      localStorage.setItem("dextra_voted", JSON.stringify([...voted]));
      const el = document.getElementById(`votes-${id}`);
      if (el) el.textContent = parseInt(el.textContent) + delta;
      showToast(delta > 0 ? "Vot înregistrat!" : "Vot negativ înregistrat.");
    } catch(e) { showToast("Eroare la vot."); }
  }

  /* ══════════════════════════════════════════════════════════
     ADD DEFINITION
  ══════════════════════════════════════════════════════════ */
  function openModal(prefill) {
    if (prefill) document.getElementById("fWord").value = prefill;
    document.getElementById("overlay").classList.add("open");
    document.getElementById("fWord").focus();
  }
  function closeModal() {
    document.getElementById("overlay").classList.remove("open");
  }
  function closeModalOnBackdrop(e) {
    if (e.target === document.getElementById("overlay")) closeModal();
  }

  async function submitDefinition() {
    const word       = document.getElementById("fWord").value.trim();
    const definition = document.getElementById("fDef").value.trim();
    const pos        = document.getElementById("fPos").value;
    const example    = document.getElementById("fExample").value.trim();
    const author     = document.getElementById("fAuthor").value.trim() || "anonim";

    if (!word)       { showToast("Te rog introdu un cuvânt."); return; }
    if (!definition) { showToast("Te rog scrie o definiție."); return; }
    if (!firebaseReady) { showToast("Firebase nu e configurat – vezi instrucțiunile."); return; }

    const btn = document.querySelector(".btn-green");
    btn.disabled = true;
    btn.textContent = "Se publică…";

    try {
      await db.collection("definitions").add({
        word,
        wordLower:  normalizeWord(word),
        definition,
        pos:        pos || null,
        example:    example || null,
        author,
        votes:      0,
        createdAt:  firebase.firestore.FieldValue.serverTimestamp()
      });

      showToast("Definiția a fost publicată!");
      closeModal();
      // Clear form
      ["fWord","fDef","fExample","fAuthor"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("fPos").value = "";
      // If search matches this word, re-run search
      if (searchInput.value.trim().toLowerCase() === word.toLowerCase()) doSearch();

    } catch(err) {
      showToast("Eroare la publicare: " + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "Publică";
    }
  }

  /* ══════════════════════════════════════════════════════════
     RECENT ADDITIONS (live listener)
  ══════════════════════════════════════════════════════════ */
  function loadRecent() {
    if (!firebaseReady) {
      document.getElementById("recentList").innerHTML = renderConfigWarning(true);
      return;
    }

    db.collection("definitions")
      .orderBy("createdAt", "desc")
      .limit(15)
      .onSnapshot(snap => {
        if (snap.empty) {
          document.getElementById("recentList").innerHTML =
            `<div class="state-msg">Nicio definiție adăugată încă. Fii primul!</div>`;
          return;
        }

        const items = snap.docs.map(d => {
          const data = d.data();
          const preview = data.definition.length > 80
            ? data.definition.slice(0, 80) + "…"
            : data.definition;
          return `<li>
            <span class="recent-word" onclick="searchFor('${escHtml(data.word)}')">${escHtml(data.word)}</span>
            <span class="recent-preview"> — ${escHtml(preview)}</span>
          </li>`;
        });

        document.getElementById("recentList").innerHTML =
          `<ul class="recent-list">${items.join("")}</ul>`;
      }, err => {
        document.getElementById("recentList").innerHTML =
          `<div class="state-msg">Nu pot încărca definițiile recente.</div>`;
      });
  }

  function searchFor(word) {
    searchInput.value = word;
    doSearch();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  /* ══════════════════════════════════════════════════════════
     CONFIG WARNING (shown when Firebase not set up)
  ══════════════════════════════════════════════════════════ */
  function renderConfigWarning(compact) {
    if (compact) return `<div class="state-msg">
      ⚠️ Firebase neconfigurat — urmează instrucțiunile din codul sursă.
    </div>`;
    return `<div class="card">
      <div class="section-title">⚠️ Configurare necesară</div>
      <p style="font-family:Arial,sans-serif;font-size:0.92rem;line-height:1.7;">
        Pentru a activa stocarea definițiilor, urmează acești pași:
      </p>
      <ol style="font-family:Arial,sans-serif;font-size:0.88rem;line-height:2;margin:10px 0 0 18px;">
        <li>Mergi la <strong>console.firebase.google.com</strong> și creează un proiect gratuit.</li>
        <li>Adaugă o aplicație Web (&lt;/&gt;) și copiază obiectul <code>firebaseConfig</code>.</li>
        <li>În Firestore Database → creează baza de date (mod test).</li>
        <li>Înlocuiește valorile placeholder din secțiunea <code>firebaseConfig</code> din fișierul HTML.</li>
      </ol>
    </div>`;
  }

  /* ══════════════════════════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════════════════════════ */
  function escHtml(str) {
    return String(str)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
  }

  /* ══════════════════════════════════════════════════════════
     KEYBOARD SHORTCUT: Escape closes modal
  ══════════════════════════════════════════════════════════ */
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
  });

  /* ── Boot ─────────────────────────────────────────────────── */
  loadRecent();
</script>
</body>
</html>
